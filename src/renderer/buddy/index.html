<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Holo3 Buddy</title>
    <link rel="stylesheet" href="../shared/styles.css" />
    <style>
      /* The Buddy window covers the entire screen, transparent, click-through.
         The triangle + speech bubble are absolutely positioned children
         driven by cursor-position events from the main process. */
      html,
      body,
      #root {
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
